<head>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #030712;
    font-family: system-ui, -apple-system, sans-serif;
    overflow-x: hidden;
  }

  section {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4rem 1rem;
    overflow: hidden;
  }

  canvas {
    position: absolute;
    inset: 0;
    z-index: 0;
  }

  .content {
    position: relative;
    z-index: 10;
    text-align: center;
    max-width: 1000px;
    padding: 3rem;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border-radius: 3rem;
  }

  .badge {
    display: inline-block;
    padding: 6px 18px;
    margin-bottom: 1.5rem;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: #22d3ee;
    font-family: monospace;
    font-size: 0.8rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: bold;
  }

  h1 {
    font-size: clamp(3rem, 8vw, 8rem);
    font-weight: 900;
    color: white;
    margin-bottom: 2rem;
    line-height: 1;
  }

  .gradient-text {
    background: linear-gradient(to right, #22d3ee, #a855f7, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: clamp(1rem, 2vw, 1.5rem);
    color: #9ca3af;
    margin-bottom: 3rem;
    max-width: 700px;
    margin-left: auto;
    margin-right: auto;
  }

  .buttons {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn-primary {
    padding: 14px 32px;
    background: white;
    color: #111827;
    font-weight: bold;
    border-radius: 999px;
    text-decoration: none;
    transition: 0.3s ease;
  }

  .btn-primary:hover {
    background: #22d3ee;
    color: white;
    transform: scale(1.05);
  }

  .btn-outline {
    padding: 14px 32px;
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    font-weight: bold;
    border-radius: 999px;
    text-decoration: none;
    transition: 0.3s ease;
  }

  .btn-outline:hover {
    background: rgba(255,255,255,0.1);
  }

  .scroll-indicator {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    opacity: 0.3;
    font-family: monospace;
    color: white;
    font-size: 10px;
    letter-spacing: 2px;
  }

  .scroll-line {
    width: 1px;
    height: 50px;
    background: linear-gradient(to bottom, white, transparent);
    margin: 10px auto 0;
  }
</style>
</head>

<body>

<section>
  <canvas id="gravityCanvas"></canvas>

  <div class="content">
    <div class="badge">Title No 1</div>

    <h1>
      Your <span class="gradient-text">Title</span>
    </h1>

    <p class="subtitle">
      Tag line or a brief description that highlights your expertise and passion in a concise manner.
    </p>

    <div class="buttons">
      <a href="" class="btn-primary">Primary Button</a>
      <a href="" class="btn-outline">Secondary Button</a>
    </div>
  </div>

</section>

<script>
const canvas = document.getElementById("gravityCanvas");
const ctx = canvas.getContext("2d");

const TRAIL_LENGTH = 15;
let particles = [];
let mouse = { x: 0, y: 0, active: false };

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  createParticles();
}

function createParticles() {
  const count = Math.min(Math.floor((canvas.width * canvas.height) / 8000), 30);
  particles = [];

  for (let i = 0; i < count; i++) {
    const hue = 180 + Math.random() * 100;
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4,
      size: Math.random() * 2 + 2,
      color: `hsla(${hue}, 90%, 65%, 1)`,
      distance: Math.random() * 100 + 100,
      history: []
    });
  }
}

window.addEventListener("resize", resizeCanvas);
window.addEventListener("mousemove", e => {
  mouse = { x: e.clientX, y: e.clientY, active: true };
});
window.addEventListener("mouseleave", () => mouse.active = false);

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.history.push({ x: p.x, y: p.y });
    if (p.history.length > TRAIL_LENGTH) p.history.shift();

    if (mouse.active) {
      const dx = p.x - mouse.x;
      const dy = p.y - mouse.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < 500 && dist > 0) {
        const targetRadius = p.distance;
        const distError = dist - targetRadius;

        const pullStrength = 0.002;
        p.vx -= dx * pullStrength * (distError / 50);
        p.vy -= dy * pullStrength * (distError / 50);

        const orbitSpeed = 0.2;
        const speedFactor = Math.max(0.1, (800 - dist) / 800);
        p.vx += (-dy / dist) * orbitSpeed * speedFactor;
        p.vy += (dx / dist) * orbitSpeed * speedFactor;
      }

      p.vx *= 0.985;
      p.vy *= 0.985;
    } else {
      p.vx += (Math.random() - 0.5) * 0.1;
      p.vy += (Math.random() - 0.5) * 0.1;
      p.vx *= 0.995;
      p.vy *= 0.995;
    }

    p.x += p.vx;
    p.y += p.vy;

    if (p.x < -50) p.x = canvas.width + 50;
    if (p.x > canvas.width + 50) p.x = -50;
    if (p.y < -50) p.y = canvas.height + 50;
    if (p.y > canvas.height + 50) p.y = -50;

    for (let i = 0; i < p.history.length - 1; i++) {
      const opacity = (i / p.history.length) * 0.5;
      const point = p.history[i];
      const nextPoint = p.history[i + 1];

      ctx.beginPath();
      ctx.moveTo(point.x, point.y);
      ctx.lineTo(nextPoint.x, nextPoint.y);
      ctx.lineWidth = p.size * (i / p.history.length);
      ctx.strokeStyle = p.color.replace("1)", opacity + ")");
      ctx.stroke();
    }

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

resizeCanvas();
animate();
</script>

</body>
</html>
