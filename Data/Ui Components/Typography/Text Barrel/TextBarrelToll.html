<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Barrel Toll</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color:linear-gradient(to right, #9a2929, #00ff00, #1e1e22) !important; 
      font-family: Arial, sans-serif;
    }
  .hero-barrel {
  position: relative;
  height: 100px;
  transform-style: preserve-3d;
  perspective: 1000px;
  font-size: large;
  color:linear-gradient(to right, #ff0000, #00ff00, #0000ff); /* Example gradient color */
}
.barrel-face {
  position: absolute;
  width: 100%;
  border: 2px solid red;
  text-align: center;
  padding: 20px;
  border-radius: 10px;
  width: 200px;
  color: white;
  background-color: rgba(193, 60, 60, 0.8); /* Semi-transparent background for better visibility */
  /* Prevents seeing the back of the text */
}

</style>
</head>
<body>


<div class="hero-barrel">
  <div class="barrel-face">YOUR</div>
  <div class="barrel-face">DIGITAL</div>
  <div class="barrel-face">EXPERIENCES</div>
</div>
</body>




<script>
  // Register any necessary plugins if used (e.g., SplitText for character-level control)
const faces = gsap.utils.toArray(".barrel-face");
const angleStep = 360 / faces.length;
const radius = 40; // Adjust this to change the "thickness" of the barrel

// Position each face in a circle along the Z-axis
faces.forEach((face, i) => {
  gsap.set(face, {
    rotationX: i * angleStep, // Rotates faces around the X-axis to form the barrel
    z: radius,
    transformOrigin: `50% 50% -${radius}px` // Sets the rotation point to the center of the barrel
  });
});

// Create the infinite rolling animation
gsap.to(".hero-barrel", {
  rotationX: 360,
  duration:1,
  ease: "easeInOut", // Creates a stepped animation for a more mechanical rolling effect
  repeat:-1,
  timeScale:1,
  transformOrigin: `50% 50% -${radius}px`
 
}) .add(function(){  hero-barrel.timeScale(hero-barrel.timeScale() - 0.5);});

</script>
